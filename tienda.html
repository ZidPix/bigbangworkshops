<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda — Big Bang Workshops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{bbwblack:'#0B0B0B',bbwyellow:'#FFD400',bbwgray:'#BFBFBF',bbwcyan:'#00E5FF',bbwmagenta:'#FF2D95'},fontFamily:{display:['"Bebas Neue"','sans-serif'],body:['Montserrat','sans-serif']}}}}</script>
  <style>.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}</style>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js" defer></script>
</head>
<body class="bg-bbwblack text-white font-body">

  <header class="sticky top-0 z-50 bg-bbwblack/90 backdrop-blur border-b border-white/10">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="font-display text-2xl tracking-widest text-bbwyellow">BIG BANG <span class="text-white">WORKSHOPS</span></a>
      <nav class="hidden md:flex items-center gap-8 text-sm font-semibold uppercase tracking-wide">
        <a href="tienda.html" class="text-bbwyellow">Tienda</a>
        <a href="tienda.html?tipo=Pack%20Digital" class="hover:text-bbwcyan transition">Packs Digitales</a>
        <a href="producto.html?h=diseno-personalizado-sube-tu-arte" class="hover:text-bbwmagenta transition">Personaliza</a>
      </nav>
      <a href="carrito.html" class="relative p-2" aria-label="Carrito">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 4.6a1 1 0 0 0 .9 1.4H19M9 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm8 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"/></svg>
        <span data-cart-count class="absolute -top-1 -right-1 bg-bbwyellow text-bbwblack text-xs font-bold w-5 h-5 rounded-full items-center justify-center hidden flex">0</span>
      </a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-10">
    <h1 class="font-display text-5xl tracking-wide mb-6">LA <span class="text-bbwyellow">TIENDA</span></h1>

    <!-- Controles -->
    <div class="flex flex-col md:flex-row gap-3 mb-4">
      <input id="q" type="search" placeholder="Buscar… (Gojo, Demon Slayer, Bluey…)"
             class="flex-1 bg-[#151515] border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-bbwyellow placeholder:text-white/30">
      <select id="tipo" class="bg-[#151515] border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-bbwyellow">
        <option value="">Todas las categorías</option>
        <option>T-Shirt</option>
        <option>Graphic Tee</option>
        <option>Playera Oversize</option>
        <option>Playera Regular Fit</option>
        <option>Pack Digital</option>
        <option>Custom Apparel</option>
      </select>
      <select id="orden" class="bg-[#151515] border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-bbwyellow">
        <option value="new">Más nuevos</option>
        <option value="price-asc">Precio: menor a mayor</option>
        <option value="price-desc">Precio: mayor a menor</option>
        <option value="az">A–Z</option>
      </select>
    </div>

    <!-- Chips -->
    <div id="chips" class="flex flex-wrap gap-2 mb-8 text-xs font-semibold"></div>

    <p id="count" class="text-bbwgray text-sm mb-4"></p>
    <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

    <div class="flex justify-center mt-10">
      <button id="more" class="hidden bg-bbwyellow text-bbwblack font-display text-xl tracking-widest px-10 py-3 rounded-lg hover:scale-105 transition">CARGAR MÁS</button>
    </div>
  </main>

  <footer class="max-w-7xl mx-auto px-4 py-12 text-sm text-bbwgray text-center">© Big Bang Workshops · Panamá</footer>

  <script>
    const PAGE = 24;
    let shown = PAGE, filtered = [];
    const $ = id => document.getElementById(id);
    const CHIPS = ["JJK", "Demon Slayer", "Dragon Ball", "One Piece", "Naruto", "Pokemon", "House of the Dragon", "UFC", "Bluey", "Gym"];

    function apply(all) {
      const q = $("q").value.trim().toLowerCase();
      const tipo = $("tipo").value;
      filtered = all.filter(p =>
        (!tipo || p.type === tipo) &&
        (!q || p.title.toLowerCase().includes(q) || (p.tags || []).join(" ").toLowerCase().includes(q))
      );
      const o = $("orden").value;
      if (o === "price-asc") filtered.sort((a, b) => a.price - b.price);
      else if (o === "price-desc") filtered.sort((a, b) => b.price - a.price);
      else if (o === "az") filtered.sort((a, b) => a.title.localeCompare(b.title));
      else filtered.sort((a, b) => Number(b.id) - Number(a.id));
      shown = PAGE;
      render();
    }
    function render() {
      $("grid").innerHTML = filtered.slice(0, shown).map(bbwCard).join("");
      $("count").textContent = filtered.length + " productos";
      $("more").classList.toggle("hidden", shown >= filtered.length);
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const all = await bbwProducts();
      const params = new URLSearchParams(location.search);
      if (params.get("q")) $("q").value = params.get("q");
      if (params.get("tipo")) $("tipo").value = params.get("tipo");

      $("chips").innerHTML = CHIPS.map(c =>
        `<button data-chip="${c}" class="border border-white/15 rounded-full px-4 py-1.5 hover:border-bbwyellow hover:text-bbwyellow transition uppercase tracking-wide">${c}</button>`
      ).join("");
      $("chips").addEventListener("click", e => {
        const c = e.target.closest("[data-chip]");
        if (c) { $("q").value = c.dataset.chip; apply(all); }
      });

      ["q", "tipo", "orden"].forEach(id => $(id).addEventListener("input", () => apply(all)));
      $("more").addEventListener("click", () => { shown += PAGE; render(); });
      apply(all);
    });
  </script>
</body>
</html>
